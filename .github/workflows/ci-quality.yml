name: CI-Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Quality Checks (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group quality

      - name: Lint
        run: |
          set -e  # this will force an error if ruff check fails
          uv run ruff check
          uv run ruff format --check

      - name: Run MyPy
        run: uv run mypy src

      - name: Run Bandit
        run: uv run bandit -r src -c pyproject.toml